{% extends "base.html" %}

{% block title %}Choose New Password - OntExtract{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="text-center mb-4">
                <h1 class="display-6 fw-bold">
                    <i class="fas fa-lock text-danger me-3"></i>
                    Choose New Password
                </h1>
                <p class="text-muted">Enter and confirm your new password.</p>
            </div>

            <div class="card">
                <div class="card-body p-4">
                    <form method="post">
                        <div class="mb-3">
                            <label for="password" class="form-label">New Password</label>
                            <input type="password" class="form-control" id="password"
                                   name="password" required minlength="6"
                                   autocomplete="new-password">
                        </div>

                        <div class="mb-3">
                            <label for="confirm_password" class="form-label">
                                Confirm New Password
                            </label>
                            <input type="password" class="form-control"
                                   id="confirm_password" name="confirm_password"
                                   required minlength="6" autocomplete="new-password">
                        </div>

                        <button type="submit" class="btn btn-danger btn-lg w-100 mb-3">
                            <i class="fas fa-save me-2"></i>Update Password
                        </button>
                    </form>

                    <div class="text-center">
                        <a href="{{ url_for('auth.login') }}" class="text-decoration-none">
                            Return to Sign In
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
